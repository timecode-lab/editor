<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeCode-Lab</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0e0e10;
  --surface:   #18181b;
  --surface2:  #222226;
  --border:    #2e2e34;
  --border2:   #3d3d45;
  --text:      #e8e8f0;
  --muted:     #8888a0;
  --accent:    #7c6af7;
  --green:     #3ecf8e;
  --green-dim: rgba(62,207,142,0.12);
  --red:       #f46868;
  --amber:     #f5a623;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
  --radius:    10px;
  --radius-sm: 6px;
}

html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.5;
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
}

/* ── HEADER ─────────────────────────────── */
header {
  padding: 11px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  background: var(--surface);
  position: sticky; top: 0; z-index: 10;
  flex-shrink: 0;
}
.logo-mark {
  width: 28px; height: 28px; background: var(--accent);
  border-radius: 7px; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-mark svg { display: block; }
header h1 {
  font-family: var(--mono); font-size: 14px; font-weight: 700;
  letter-spacing: -0.3px; color: var(--text);
}
header h1 span { color: var(--accent); }
.header-sub { font-size: 11px; color: var(--muted); margin-left: auto; font-family: var(--mono); }

/* ── MAIN ───────────────────────────────── */
main {
  flex: 1; display: flex; flex-direction: column;
  padding: 13px; gap: 11px;
  max-width: 760px; width: 100%; margin: 0 auto;
}

/* ── INPUT ROW ──────────────────────────── */
.input-row { display: flex; gap: 8px; align-items: stretch; }
.streamer-select-wrap { flex: 1; position: relative; display: flex; flex-direction: column; }
.streamer-select {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-family: var(--mono);
  font-size: 14px; padding: 0 32px 0 12px; height: 44px; outline: none;
  cursor: pointer; -webkit-appearance: none; appearance: none; transition: border-color 0.15s;
}
.streamer-select:focus { border-color: var(--accent); }
.streamer-select option { background: var(--surface2); color: var(--text); }
.select-arrow {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  pointer-events: none; color: var(--muted); font-size: 9px;
}
.streamer-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-family: var(--mono);
  font-size: 14px; padding: 0 12px; height: 44px; outline: none;
  transition: border-color 0.15s; display: none;
}
.streamer-input::placeholder { color: var(--muted); }
.streamer-input:focus { border-color: var(--accent); }
.streamer-input.visible { display: block; }

/* ── BUTTONS ────────────────────────────── */
.btn {
  height: 44px; padding: 0 16px;
  border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--surface); color: var(--text);
  font-family: var(--mono); font-size: 12px; font-weight: 500;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, transform 0.08s, opacity 0.12s;
  white-space: nowrap; display: flex; align-items: center; justify-content: center; gap: 5px;
  flex-shrink: 0; -webkit-user-select: none; user-select: none;
  touch-action: manipulation;
}
.btn:hover  { background: var(--surface2); border-color: var(--border2); }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.3; pointer-events: none; }

.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: #6a5be0; border-color: #6a5be0; }

.btn-green { background: var(--green-dim); border-color: rgba(62,207,142,0.35); color: var(--green); }
.btn-green:hover { background: rgba(62,207,142,0.22); }

.btn-danger { background: rgba(244,104,104,0.12); border-color: rgba(244,104,104,0.35); color: var(--red); }
.btn-danger:hover { background: rgba(244,104,104,0.22); }

/* ── STATUS ─────────────────────────────── */
.status-bar {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 11px; color: var(--muted); min-height: 18px;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.status-dot.ok      { background: var(--green); }
.status-dot.error   { background: var(--red); }
.status-dot.loading { background: var(--accent); animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.status-text { flex: 1; }
.song-count {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 4px; padding: 1px 6px; font-size: 10px; color: var(--muted);
}

/* ── TOOLBAR ────────────────────────────── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: nowrap;     /* desktop: single row */
}
.toolbar-sep {
  width: 1px; height: 22px;
  background: var(--border); flex-shrink: 0;
}
.toolbar-row {
  display: contents; /* desktop: flat, items flow into toolbar */
}
.toolbar .btn { height: 36px; font-size: 12px; padding: 0 12px; }

/* Mobile: two rows */
@media (max-width: 540px) {
  .toolbar {
    flex-direction: column;
    align-items: stretch;
    gap: 6px;
  }
  .toolbar-sep { display: none; }
  .toolbar-row {
    display: flex;
    gap: 6px;
  }
  .toolbar-row .btn { flex: 1; }

  /* order: main row first, history row second */
  .toolbar-main    { order: 1; }
  .toolbar-history { order: 2; }
}

/* ── EDITOR SHELL ───────────────────────── */
.editor-wrap {
  flex: 1; display: flex; flex-direction: column;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  min-height: 300px;
}
.editor-titlebar {
  padding: 6px 12px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 10px; color: var(--muted);
  flex-shrink: 0;
}
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-r { background: #f46868; }
.dot-a { background: var(--amber); }
.dot-g { background: var(--green); }
.editor-filename { margin-left: 5px; }

/* ── TEXTAREA ───────────────────────────── */
#editor {
  flex: 1;
  width: 100%;
  min-height: 280px;
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  color: var(--text);
  font-family: var(--mono);
  line-height: 1.85;
  padding: 12px 14px;
  caret-color: var(--accent);
  /* iOS: prevent zoom on focus */
  font-size: max(14px, 16px);
  /* smooth scroll on mobile */
  -webkit-overflow-scrolling: touch;
  overflow-y: auto;
}
/* back to 14px on large screens */
@media (min-width: 541px) {
  #editor { font-size: 14px; }
}
#editor::placeholder { color: var(--muted); }

/* ── CONFIRM ────────────────────────────── */
.confirm-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.65);
  z-index: 200; display: flex; align-items: flex-end;
  justify-content: center; padding-bottom: 20px;
}
.confirm-box {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 20px;
  width: calc(100% - 32px); max-width: 420px;
  display: flex; flex-direction: column; gap: 16px;
  animation: slide-up 0.17s ease;
}
@keyframes slide-up { from{transform:translateY(14px);opacity:0} to{transform:none;opacity:1} }
.confirm-title { font-family: var(--mono); font-size: 14px; color: var(--text); }
.confirm-sub   { font-size: 12px; color: var(--muted); margin-top: 4px; }
.confirm-btns  { display: flex; gap: 8px; }
.confirm-btns .btn { flex: 1; height: 42px; }

/* ── TOAST ──────────────────────────────── */
#toast-container {
  position: fixed; top: 54px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; gap: 8px;
  align-items: center; pointer-events: none; z-index: 300;
}
.toast {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 20px; padding: 7px 16px;
  font-family: var(--mono); font-size: 12px; color: var(--text);
  animation: t-in 0.2s ease, t-out 0.2s ease 2s forwards;
  white-space: nowrap;
}
.toast.ok  { border-color: rgba(62,207,142,0.4); color: var(--green); }
.toast.err { border-color: rgba(244,104,104,0.4); color: var(--red); }
@keyframes t-in  { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:none} }
@keyframes t-out { to{opacity:0} }

/* ── SPINNER ────────────────────────────── */
.spinner {
  display: inline-block; width: 13px; height: 13px;
  border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff;
  border-radius: 50%; animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo-mark">
    <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
      <rect x="2" y="8" width="14" height="2" rx="1" fill="white"/>
      <rect x="2" y="4" width="8"  height="2" rx="1" fill="rgba(255,255,255,0.5)"/>
      <rect x="2" y="12" width="11" height="2" rx="1" fill="rgba(255,255,255,0.5)"/>
    </svg>
  </div>
  <h1>TimeCode<span>-Lab</span></h1>
  <span class="header-sub">streamersonglist</span>
</header>

<main>
  <!-- Streamer picker -->
  <div class="input-row">
    <div class="streamer-select-wrap">
      <select class="streamer-select" id="streamer-select" onchange="onSelectChange(this)">
        <option value="__custom__">другой стример...</option>
      </select>
      <span class="select-arrow">▼</span>
      <input class="streamer-input" id="streamer-input" type="text"
        placeholder="имя или ID стримера..." autocomplete="off" spellcheck="false"/>
    </div>
    <button class="btn btn-primary" id="btn-load">
      <span id="load-label">загрузить</span>
    </button>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-text" id="status-text">выберите стримера</span>
    <span class="song-count" id="song-count" style="display:none"></span>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-row toolbar-history">
      <button class="btn" id="btn-undo" title="Ctrl+Z">↩ отмена</button>
      <button class="btn" id="btn-redo" title="Ctrl+Y">↪ повтор</button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-row toolbar-main">
			<button class="btn btn-green" id="btn-timecodes">⏱ таймкоды</button>
			<button class="btn" id="btn-copy">⎘ копировать</button>
			<button class="btn" id="btn-clear">✕ очистить</button>
    </div>
  </div>

  <!-- Editor -->
  <div class="editor-wrap">
    <div class="editor-titlebar">
      <div class="dot dot-r"></div>
      <div class="dot dot-a"></div>
      <div class="dot dot-g"></div>
      <span class="editor-filename">timecodes.txt</span>
    </div>
    <textarea id="editor"
      placeholder="Нажмите Загрузить, чтобы начать…"
      spellcheck="false"
      autocorrect="off"
      autocapitalize="off"
      autocomplete="off"
    ></textarea>
  </div>
</main>

<!-- Confirm dialog -->
<div id="confirm-overlay" class="confirm-overlay" style="display:none">
  <div class="confirm-box">
    <div>
      <div class="confirm-title" id="confirm-title">Подтверждение</div>
      <div class="confirm-sub"  id="confirm-sub"></div>
    </div>
    <div class="confirm-btns">
			<button class="btn" id="confirm-cancel">отмена</button>
			<button class="btn btn-danger" id="confirm-ok-btn">ОК</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
'use strict';

const API_BASE					= 'https://api.streamersonglist.com/v1';
const API_PROXY					= 'https://editor-lovat-beta.vercel.app/api/proxy';
const GAP_THRESHOLD			= 6 * 60 * 60 * 1000;
const UNDO_LIMIT				= 200;
const STORAGE_KEY				= 'tclab_v1';
const STORAGE_STREAMER	= 'tclab_streamer';
const KNOWN_IDS					= { 'vanilla__bun': 39650, 'gellert_lera': 28268, 'maniavolk': 39141 };
const TIME_SEP					= ' \u2013 ';
const TEXT_SEP					= ' - ';

let playedAtArr					= [];
let undoStack						= [];
let redoStack						= [];
let confirmCb						= null;
let currentStreamer			= null;
let inputTimer					= null;

const PRESETS = {

  default: {
    timeFormat: '0:00:00',
    separator:  TIME_SEP,
    text:   { rules: [{ type: 'default' }] },
    visual: { mode: 'detect' },
  },

  gellert_lera: {
    timeFormat: '0:00:00',
    separator:  TIME_SEP,
		header: 'Тайм-коды:',
    text: {
      rules: [
        { type: 'fromPrefix', prefix: 'из' },
        { type: 'authorTag', artist: 'gellert lera', suffix: ' (авторская)' },
        { type: 'default' },
      ],
    },
    visual: { mode: 'detect', order: 'artist-title' },
  },

	vanilla__bun: {
		timeFormat: '00:00:00',
		separator:  TIME_SEP,
		header: ['ТАЙМ-КОДЫ🌸', ''],
		footer: [
			'',
			'Друзья, приглашаем вас на наши уютные стримы в отличной компании!',
			'В четверг и в воскресенье в 19:00 (мск)',
			'',
			'Всем добра ✨'
		],
		text:   { rules: [{ type: 'default' }] },
		visual: {
			mode: 'detect',
			order: 'artist-title',
			authorEmoji: {
				matchArtist: 'vanilla bun',
				left: '❤‍🔥',
				right: '❤‍🔥'
			}
		},
	},
	
	maniavolk: {
			timeFormat: '0:00:00',
			separator: '  ',
			text: { rules: [{ type: 'default' }] },
			visual: {
				mode: 'none',
				order: 'title-artist',
				extraSpacing: true,
				liveLearning: true
			},
		},
	
};

function getPreset(streamerName) {
  return PRESETS[streamerName] || PRESETS.default;
}

function normalizeSong(item) {
  const song = item && typeof item.song === 'object' ? item.song : null;

  if (song) {
    return {
      artist: (song.artist || '').trim(),
      title:  (song.title  || '').trim(),
      raw:    null,
    };
  }

  const nonlist =
    (typeof item.nonlistSong === 'string' && item.nonlistSong) ||
    (item.requests?.[0] && typeof item.requests[0].nonlistSong === 'string' && item.requests[0].nonlistSong);

  if (nonlist) {
    return { artist: '', title: '', raw: nonlist.trim() };
  }

  return { artist: '', title: '', raw: 'Неизвестная песня' };
}

function applyTextRules(normalized, preset) {
  const { artist, title, raw } = normalized;

  if (raw !== null) return raw;

  const rules = preset.text?.rules ?? [];

  for (const rule of rules) {
    const result = runTextRule(rule, artist, title, preset);
    if (result !== null) return result;
  }

  return 'Неизвестная песня';
}

function formatByOrder(artist, title, order) {
  const parts =
    order === 'title-artist'
      ? [title, artist]
      : [artist, title];

  return parts.filter(Boolean).join(TEXT_SEP);
}

function runTextRule(rule, artist, title, preset) {
  switch (rule.type) {

    case 'fromPrefix': {
      const prefix = (rule.prefix || '').toLowerCase();
      if (artist.toLowerCase().startsWith(prefix)) {
        return [title, artist ? `(${artist})` : ''].filter(Boolean).join(' ');
      }
      return null;
    }

		case 'authorTag': {
			if (artist.toLowerCase() === (rule.artist || '').toLowerCase()) {
				const order = preset.visual?.order || 'artist-title';
				return formatByOrder(artist, title, order) + (rule.suffix || '');
			}
			return null;
		}

		case 'default': {
			const order = preset.visual?.order || 'artist-title';
			return formatByOrder(artist, title, order) || null;
		}

    default:
      return null;
  }
}

function normalizeBlock(block) {
  if (!block) return [];
  return Array.isArray(block) ? block : [block];
}

function splitBlock(lines, block, fromEnd = false) {
  const normalized = normalizeBlock(block);
  if (!normalized.length) return { main: lines, block: [] };

  if (!fromEnd) {
    const matches = normalized.every((v, i) => lines[i] === v);
    return matches
      ? { block: lines.slice(0, normalized.length), main: lines.slice(normalized.length) }
      : { block: [], main: lines };
  }

  const startIdx = lines.length - normalized.length;
  if (startIdx < 0) return { main: lines, block: [] };

  const matches = normalized.every((v, i) => lines[startIdx + i] === v);
  return matches
    ? { main: lines.slice(0, startIdx), block: lines.slice(startIdx) }
    : { main: lines, block: [] };
}

function joinBlock(main, block, fromEnd = false) {
  if (!block.length) return main;
  return fromEnd ? [...main, ...block] : [...block, ...main];
}

function parseEditorLine(line, expectedSep = ' - ') {
  const TC_RE = /(\d{1,2}:\d{2}(?::\d{2})?)/;
  const m = line.match(TC_RE);
  if (!m) return null;

  const timeStr = m[1];
  const timeIdx = line.indexOf(timeStr);

  const prefix = line.slice(0, timeIdx);
  const afterTime = line.slice(timeIdx + timeStr.length);

  let sepIdx = afterTime.indexOf(expectedSep);
  let sepLen = expectedSep.length;

  if (sepIdx === -1) {
    const dashMatch = afterTime.match(/\s[-–—]\s/);
    if (dashMatch) {
      sepIdx = dashMatch.index;
      sepLen = dashMatch[0].length;
    } else {
      return {
        prefix,
        time: parseTC(timeStr),
        timeStr,
        suffix: '',
        text: afterTime.trim(),
        raw: line,
      };
    }
  }

  return {
    prefix,
    time: parseTC(timeStr),
    timeStr,
    suffix: afterTime.slice(0, sepIdx),
    text: afterTime.slice(sepIdx + sepLen).trim(),
    raw: line,
  };
}

function serializeLine(ast, timeStr, sep) {
  return `${ast.prefix}${timeStr}${ast.suffix}${sep}${ast.text}`;
}

function calcTimecodes() {
  const ed = getEditor();
  const raw = ed.value;

  if (!raw.trim()) {
    toast('редактор пуст', 'err');
    return;
  }

  const preset = getPreset(currentStreamer);
  const lines  = raw.split('\n');
	
	const { block: headerLines, main: bodyWithFooter } =
		splitBlock(lines, preset.header, false);

	const { main: bodyLines, block: footerLines } =
		splitBlock(bodyWithFooter, preset.footer, true);

  const astList = bodyLines.map(line => parseEditorLine(line, preset.separator));

  const validByIdx = new Map();
  const validSeq   = [];

  astList.forEach((ast, i) => {
    if (ast) {
      const entry = { ast, idx: i };
      validByIdx.set(i, entry);
      validSeq.push(entry);
    }
  });

  if (!validSeq.length) {
    toast('нет строк в нужном формате', 'err');
    return;
  }

  const emojiPattern = (preset.visual.mode === 'detect')
    ? extractEmojiPatternFromAST(validSeq)
    : null;

  const anchorSeqIdx = validSeq.findIndex(e => e.ast.time !== 0);
  const canRecalc = anchorSeqIdx !== -1 && playedAtArr.length === validSeq.length;

  if (anchorSeqIdx !== -1 && playedAtArr.length && !canRecalc) {
    console.warn('[TCLab] playedAtArr.length !== validSeq.length; skipping time recalc');
  }

  if (canRecalc) {
    let t = validSeq[anchorSeqIdx].ast.time;

    for (let i = anchorSeqIdx; i < validSeq.length; i++) {
      if (i > anchorSeqIdx) {
        const d = playedAtArr[i] - playedAtArr[i - 1];
        if (!isFinite(d)) break;
        t += Math.round(d / 1000);
        if (t < 0) t = 0;
      }
      validSeq[i].ast.time = t;
    }

    t = validSeq[anchorSeqIdx].ast.time;

    for (let i = anchorSeqIdx - 1; i >= 0; i--) {
      const d = playedAtArr[i + 1] - playedAtArr[i];
      if (!isFinite(d)) break;
      t -= Math.round(d / 1000);
      if (t < 0) t = 0;
      validSeq[i].ast.time = t;
    }
  }

  const rebuiltLines = bodyLines.map((line, i) => {
    const entry = validByIdx.get(i);
    if (!entry) return line;

    entry.ast.timeStr = formatTC(entry.ast.time, preset.timeFormat);
    return serializeLine(entry.ast, entry.ast.timeStr, preset.separator);
  });

  const finalLines = applyVisualPreset(rebuiltLines, validByIdx, preset, emojiPattern);

	const withHeader = joinBlock(
		finalLines,
		headerLines.length ? headerLines : normalizeBlock(preset.header),
		false
	);

	const resultLines = joinBlock(
		withHeader,
		footerLines.length ? footerLines : normalizeBlock(preset.footer),
		true
	);

  commitToEditor(ed, resultLines.join('\n'));

  const hasAnchor = anchorSeqIdx !== -1;
  const hasEmoji  = emojiPattern && (emojiPattern.left || emojiPattern.right);
  const isFixed   = preset.visual.mode === 'fixed';

  if (hasAnchor) {
    toast((hasEmoji || isFixed) ? 'таймкоды пересчитаны + emoji' : 'таймкоды пересчитаны', 'ok');
  } else if (hasEmoji || isFixed) {
    toast('форматирование стиля', 'ok');
  } else {
    toast('введите начальный таймкод или добавьте emoji', 'err');
  }
}

function applyVisualPreset(lines, validByIdx, preset, emojiPattern) {
  const { visual, separator: sep, timeFormat } = preset;
  let visualIdx = 0;

  return lines.map((line, i) => {
    const entry = validByIdx.get(i);
    if (!entry) return line;

    const ast = entry.ast;
    let songText = ast.text;
    let headerText = "";

    if (visual.liveLearning && songText.toUpperCase().includes('[LIVE LEARNING]')) {
      songText = songText.replace(/\[LIVE LEARNING\]/gi, '').trim();
      headerText = "⚡️⚡️⚡️ Live Learning ⚡️⚡️⚡️\n";
    }

    let formattedLine = "";
    if (visual.mode === 'none') {
      formattedLine = `${ast.timeStr}${sep}${songText}`;

		} else if (visual.mode === 'detect') {
			const pattern = emojiPattern || { left: null, right: null };

			let leftEmoji  = pattern.left  ? pattern.left[visualIdx % pattern.left.length]  : '';
			let rightEmoji = pattern.right ? pattern.right[visualIdx % pattern.right.length] : '';

			const authorCfg = visual.authorEmoji;

			if (authorCfg) {
				const parts = ast.text.split(/\s[-–—]\s/);

				let artist = '';

				if (parts.length === 2) {
					if (preset.visual?.order === 'title-artist') {
						artist = parts[1].toLowerCase();
					} else {
						artist = parts[0].toLowerCase();
					}
				}

				if (artist === authorCfg.matchArtist.toLowerCase()) {
					const hasLeftPattern  = pattern.left && pattern.left.length;
					const hasRightPattern = pattern.right && pattern.right.length;

					if (hasLeftPattern && authorCfg.left !== undefined) {
						leftEmoji = authorCfg.left || '';
					}

					if (hasRightPattern && authorCfg.right !== undefined && authorCfg.right !== null) {
						rightEmoji = authorCfg.right;
					}
				}
			}

			formattedLine = `${leftEmoji}${ast.timeStr}${rightEmoji}${sep}${songText}`;
    } else if (visual.mode === 'fixed') {
      const le = visual.left ? visual.left[visualIdx % visual.left.length] : '';
      const ri = visual.right ? visual.right[visualIdx % visual.right.length] : '';
      formattedLine = `${le}${ast.timeStr}${ri}${sep}${songText}`;
    }

    let finalResult = headerText + formattedLine;
    if (visual.extraSpacing && visualIdx > 0) {
      finalResult = "\n" + finalResult;
    }

    visualIdx++;
    return finalResult;
  });
}

function parseTC(s) {
  if (!s) return 0;
  const p = String(s).split(':').map(Number);
  if (p.some(isNaN)) return 0;
  if (p.length === 3) return p[0] * 3600 + p[1] * 60 + p[2];
  if (p.length === 2) return p[0] * 60 + p[1];
  return 0;
}

function formatTC(sec, fmt) {
  const s = Math.max(0, Math.round(sec));
  const h  = Math.floor(s / 3600);
  const m  = Math.floor((s % 3600) / 60);
  const ss = s % 60;

  const template = fmt || '0:00:00';
  const parts    = template.split(':');

  if (parts.length === 2) {
    return `${parts[0].length === 2 ? pad(m) : m}:${pad(ss)}`;
  }
  if (parts.length === 3) {
    return `${parts[0].length === 2 ? pad(h) : h}:${pad(m)}:${pad(ss)}`;
  }
  return `${h}:${pad(m)}:${pad(ss)}`;
}

function pad(n) { return String(n).padStart(2, '0'); }

let segmenter = null;
try { segmenter = new Intl.Segmenter('ru', { granularity: 'grapheme' }); } catch {}

function splitGraphemes(str) {
  if (segmenter) return [...segmenter.segment(str)].map(s => s.segment);
  return Array.from(str);
}

function isEmoji(char) {
  return /\p{Extended_Pictographic}/u.test(char) && !/[0-9#*]/.test(char);
}

function extractEmojiPatternFromAST(validSeq) {
  const left  = [];
  const right = [];

  for (const { ast } of validSeq) {
    const le = splitGraphemes(ast.prefix).filter(isEmoji);
    const re = splitGraphemes(ast.suffix).filter(isEmoji);
    if (le.length) left.push(...le);
    if (re.length) right.push(...re);
  }

  return {
    left:  left.length  ? left  : null,
    right: right.length ? right : null,
  };
}

function pushUndo(text) {
  if (undoStack.length && undoStack[undoStack.length - 1] === text) return;
  undoStack.push(text);
  if (undoStack.length > UNDO_LIMIT) undoStack.shift();
  redoStack = [];
  updateUndoBtns();
}

function edUndo() {
  const ed = getEditor();
  if (undoStack.length <= 1) return;
  redoStack.push(undoStack.pop());
  const text = undoStack[undoStack.length - 1] ?? '';
  ed.value = text;
  localStorage.setItem(STORAGE_KEY, text);
  updateUndoBtns();
}

function edRedo() {
  if (!redoStack.length) return;
  const text = redoStack.pop();
  undoStack.push(text);
  getEditor().value = text;
  localStorage.setItem(STORAGE_KEY, text);
  updateUndoBtns();
}

function updateUndoBtns() {
  document.getElementById('btn-undo').disabled = undoStack.length <= 1;
  document.getElementById('btn-redo').disabled = redoStack.length === 0;
}

function commitToEditor(ed, text) {
  if (ed.value === text) return;

  const prev = ed.value;
  ed.value = text;

  pushUndo(prev);
  pushUndo(text);

  localStorage.setItem(STORAGE_KEY, text);
  updateUndoBtns();
}

function getEditor() { return document.getElementById('editor'); }

function onEditorInput() {
  clearTimeout(inputTimer);
  inputTimer = setTimeout(() => {
    const val = getEditor().value;
    pushUndo(val);
    localStorage.setItem(STORAGE_KEY, val);
  }, 600);
}

function onEditorKeyDown(e) {
  const ctrl = e.ctrlKey || e.metaKey;
  if (ctrl && !e.shiftKey && e.key === 'z') { e.preventDefault(); edUndo(); return; }
  if (ctrl && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); edRedo(); return; }
}

function onSelectChange(sel) {
  const inp = document.getElementById('streamer-input');
  if (sel.value === '__custom__') {
    currentStreamer = null;
    setStreamerToURL(null);
    saveStreamer(null);
    sel.style.display = 'none';
    inp.classList.add('visible');
    inp.focus();
    return;
  }
  currentStreamer = sel.value;
  setStreamerToURL(currentStreamer);
  saveStreamer(currentStreamer);
}

function getStreamerFromURL() {
  const hash = window.location.hash.replace('#', '').trim();
  return (hash && KNOWN_IDS[hash]) ? hash : null;
}
function setStreamerToURL(name) {
  history.replaceState(null, '', name ? `#${name}` : window.location.pathname);
}
function saveStreamer(name) {
  if (name) localStorage.setItem(STORAGE_STREAMER, name);
  else localStorage.removeItem(STORAGE_STREAMER);
}
function loadStreamer() { return localStorage.getItem(STORAGE_STREAMER); }

window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    getEditor().value = saved;
    pushUndo(saved);
    setStatus('', 'восстановлено из localStorage', false);
  } else {
    pushUndo('');
  }

  const sel = document.getElementById('streamer-select');
  const inp = document.getElementById('streamer-input');
  sel.innerHTML = '';
  for (const name of Object.keys(KNOWN_IDS)) {
    const opt = document.createElement('option');
    opt.value = name; opt.textContent = name;
    sel.appendChild(opt);
  }
  const optCustom = document.createElement('option');
  optCustom.value = '__custom__'; optCustom.textContent = 'другой стример...';
  sel.appendChild(optCustom);

  const urlStreamer   = getStreamerFromURL();
  const savedStreamer = loadStreamer();
  currentStreamer = (urlStreamer) ||
                   (savedStreamer && KNOWN_IDS[savedStreamer] ? savedStreamer : null);
  sel.value = currentStreamer || '__custom__';

  inp.addEventListener('keydown', e => { if (e.key === 'Enter') loadSongs(); });
  inp.addEventListener('blur', () => {
    if (!inp.value.trim()) {
      inp.classList.remove('visible');
      sel.style.display = '';
      sel.value = currentStreamer || '__custom__';
    }
  });

  const ed = getEditor();
  ed.addEventListener('keydown', onEditorKeyDown);
  ed.addEventListener('input',   onEditorInput);
  updateUndoBtns();
	
	document.getElementById('btn-load').addEventListener('click', loadSongs);
	document.getElementById('btn-undo').addEventListener('click', edUndo);
	document.getElementById('btn-redo').addEventListener('click', edRedo);
	document.getElementById('btn-timecodes').addEventListener('click', calcTimecodes);
	document.getElementById('btn-copy').addEventListener('click', copyText);
	document.getElementById('btn-clear').addEventListener('click', clearEditor);

	document.getElementById('confirm-overlay').addEventListener('click', confirmBgClick);
	document.getElementById('confirm-cancel').addEventListener('click', confirmCancel);
	document.getElementById('confirm-ok-btn').addEventListener('click', confirmOk);
});

async function resolveStreamerId(nameOrId) {
  if (/^\d+$/.test(nameOrId)) return parseInt(nameOrId, 10);
  if (KNOWN_IDS[nameOrId] !== undefined) return KNOWN_IDS[nameOrId];
  const r = await fetchWithFallback(`/streamers/${encodeURIComponent(nameOrId)}`);
  if (!r.ok) {
    throw new Error(r.status === 404
      ? `стример «${nameOrId}» не найден`
      : `ошибка API: ${r.status}`);
  }
  const d = await r.json();
  if (!d.id) throw new Error('не удалось получить ID стримера');
  return d.id;
}

async function loadSongs() {
  if (document.getElementById('btn-load').disabled) return;

  const sel      = document.getElementById('streamer-select');
  const inp      = document.getElementById('streamer-input');
  const isCustom = inp.classList.contains('visible');
  const nameOrId = isCustom ? inp.value.trim() : sel.value;

  if (!nameOrId || nameOrId === '__custom__') {
    toast('введите имя стримера', 'err');
    return;
  }

  setStatus('loading', 'получаем данные…', false);
  setBtnLoading(true);

  try {
    const sid = await resolveStreamerId(nameOrId);
    const hr  = await fetchWithFallback(`/streamers/${sid}/playHistory?size=100&current=0`);
    if (!hr.ok) throw new Error(`ошибка истории: ${hr.status}`);

    const hd    = await hr.json();
    const items = hd.items || hd.data || hd;
    if (!Array.isArray(items) || !items.length) throw new Error('история воспроизведения пуста');

    const ls = extractLastStream(items);
    if (!ls.length) throw new Error('не удалось определить последний стрим');
    ls.reverse();

    const streamerName = isCustom ? nameOrId : (currentStreamer || nameOrId);
    const preset = getPreset(streamerName);

    playedAtArr = ls.map(x => new Date(x.playedAt).getTime());

		const body = ls.map(x => {
			const normalized = normalizeSong(x);
			const songText   = applyTextRules(normalized, preset);
			return `${formatTC(0, preset.timeFormat)}${preset.separator}${songText}`;
		});
		
		const header = normalizeBlock(preset.header);
		const text = [...header, ...body].join('\n');

    commitToEditor(getEditor(), text);
    setStatus('ok', `${nameOrId} — последний стрим`, true, ls.length);
    toast(`загружено ${ls.length} песен`, 'ok');

  } catch (err) {
    setStatus('error', err.message || 'неизвестная ошибка', false);
    toast(err.message || 'ошибка загрузки', 'err');
  } finally {
    setBtnLoading(false);
  }
}

async function fetchWithFallback(path, proxyDelay = 1000) {
  const startTime = Date.now();
  const directCtrl = new AbortController();
  const proxyCtrl  = new AbortController();

  const toProxyUrl = p => `${API_PROXY}?endpoint=${encodeURIComponent('/v1' + p)}`;

  const makeTask = async (url, label, ctrl, delay = 0) => {
    if (delay) await new Promise(r => setTimeout(r, delay));
    const response = await fetch(url, { signal: ctrl.signal });
    if (!response.ok) throw new Error(`${label} failed (${response.status})`);
    console.log(`[TCLab] ${label} OK in ${((Date.now() - startTime) / 1000).toFixed(2)}s`);
    return { response, label };
  };

  const directTask = makeTask(API_BASE + path, 'Direct API', directCtrl);
  const proxyTask  = makeTask(toProxyUrl(path), 'Proxy API',  proxyCtrl, proxyDelay);

  try {
    const winner = await Promise.any([directTask, proxyTask]);
    (winner.label === 'Direct API' ? proxyCtrl : directCtrl).abort();
    return winner.response;
  } catch (err) {
    if (err instanceof AggregateError) console.error('[TCLab] All requests failed:', err.errors);
    else console.error('[TCLab] Request failed:', err);
    throw new Error('Не удалось получить данные (API и прокси недоступны)');
  }
}

function extractLastStream(items) {
  const clean = items
    .filter(x => x?.playedAt)
    .map(x => ({ ...x, ts: new Date(x.playedAt).getTime() }))
    .filter(x => !isNaN(x.ts));

  if (!clean.length) return [];
  clean.sort((a, b) => b.ts - a.ts);

  const result = [clean[0]];
  for (let i = 1; i < clean.length; i++) {
    if (clean[i - 1].ts - clean[i].ts > GAP_THRESHOLD) break;
    result.push(clean[i]);
  }
  return result;
}

async function copyText() {
  const text = getEditor().value;
  if (!text.trim()) { toast('нечего копировать', 'err'); return; }
  try {
    await navigator.clipboard.writeText(text);
  } catch {
    const ed = getEditor(); ed.select(); document.execCommand('copy');
  }
  toast('скопировано', 'ok');
}

function clearEditor() {
  showConfirm('Очистить редактор?', 'Текст и таймкоды будут удалены', 'очистить', () => {
    const ed = getEditor();
    commitToEditor(ed, '');
    playedAtArr = [];
    setStatus('', 'редактор очищен', false);
    toast('очищено', '');    
  });
}

function setStatus(type, msg, showCount, count) {
  const classes = { ok: 'ok', error: 'error', loading: 'loading' };
  document.getElementById('status-dot').className = `status-dot${type && classes[type] ? ' ' + classes[type] : ''}`;
  document.getElementById('status-text').textContent = msg;
  const cnt = document.getElementById('song-count');
  cnt.style.display = (showCount && count) ? '' : 'none';
  if (showCount && count) cnt.textContent = `${count} песен`;
}

function setBtnLoading(loading) {
  const btn = document.getElementById('btn-load');
  const lbl = document.getElementById('load-label');
  btn.disabled  = loading;
  lbl.textContent = '';
  if (loading) {
    const sp = document.createElement('span');
    sp.className = 'spinner';
    lbl.appendChild(sp);
  } else {
    lbl.textContent = 'загрузить';
  }
}

function toast(msg, type) {
  const el = document.createElement('div');
  el.className = `toast${type ? ' ' + type : ''}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

function showConfirm(title, sub, okLabel, cb) {
  document.getElementById('confirm-title').textContent    = title;
  document.getElementById('confirm-sub').textContent      = sub;
  document.getElementById('confirm-ok-btn').textContent   = okLabel;
  confirmCb = cb;
  document.getElementById('confirm-overlay').style.display = 'flex';
}
function confirmOk() {
  document.getElementById('confirm-overlay').style.display = 'none';
  if (confirmCb) { confirmCb(); confirmCb = null; }
}
function confirmCancel() {
  document.getElementById('confirm-overlay').style.display = 'none';
  confirmCb = null;
}
function confirmBgClick(e) {
  if (e.target === document.getElementById('confirm-overlay')) confirmCancel();
}
