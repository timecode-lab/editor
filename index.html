<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeCode-Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0e0e10;
  --surface: #18181b;
  --surface2: #222226;
  --border: #2e2e34;
  --border2: #3d3d45;
  --text: #e8e8f0;
  --muted: #8888a0;
  --accent: #7c6af7;
  --green: #3ecf8e;
  --green-dim: rgba(62,207,142,0.12);
  --red: #f46868;
  --amber: #f5a623;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
  --radius: 10px;
  --radius-sm: 6px;
  --line-h: 30px;
  --editor-pad: 10px;
  --gutter: 34px;
}

html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.5;
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
}

/* HEADER */
header {
  padding: 11px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  background: var(--surface);
  position: sticky; top: 0; z-index: 10;
  flex-shrink: 0;
}
.logo-mark {
  width: 28px; height: 28px; background: var(--accent);
  border-radius: 7px; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-mark svg { display: block; }
header h1 {
  font-family: var(--mono); font-size: 14px; font-weight: 700;
  letter-spacing: -0.3px; color: var(--text);
}
header h1 span { color: var(--accent); }
.header-sub { font-size: 11px; color: var(--muted); margin-left: auto; font-family: var(--mono); }

/* MAIN */
main {
  flex: 1; display: flex; flex-direction: column;
  padding: 13px; gap: 11px;
  max-width: 760px; width: 100%; margin: 0 auto;
}

/* INPUT ROW */
.input-row { display: flex; gap: 8px; align-items: stretch; }
.streamer-select-wrap { flex: 1; position: relative; display: flex; flex-direction: column; }
.streamer-select {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-family: var(--mono);
  font-size: 14px; padding: 0 32px 0 12px; height: 44px; outline: none;
  cursor: pointer; -webkit-appearance: none; appearance: none; transition: border-color 0.15s;
}
.streamer-select:focus { border-color: var(--accent); }
.streamer-select option { background: var(--surface2); color: var(--text); }
.select-arrow {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  pointer-events: none; color: var(--muted); font-size: 9px;
}
.streamer-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-family: var(--mono);
  font-size: 14px; padding: 0 12px; height: 44px; outline: none;
  transition: border-color 0.15s; display: none;
}
.streamer-input::placeholder { color: var(--muted); }
.streamer-input:focus { border-color: var(--accent); }
.streamer-input.visible { display: block; }

/* BUTTONS */
.btn {
  height: 44px; padding: 0 16px;
  border-radius: var(--radius-sm); border: 1px solid var(--border);
  background: var(--surface); color: var(--text);
  font-family: var(--mono); font-size: 12px; font-weight: 500;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, transform 0.08s, opacity 0.12s;
  white-space: nowrap; display: flex; align-items: center; gap: 5px;
  flex-shrink: 0; -webkit-user-select: none; user-select: none;
}
.btn:hover { background: var(--surface2); border-color: var(--border2); }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.3; pointer-events: none; }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: #6a5be0; border-color: #6a5be0; }
.btn-green { background: var(--green-dim); border-color: rgba(62,207,142,0.35); color: var(--green); }
.btn-green:hover { background: rgba(62,207,142,0.22); }
.btn-danger { background: rgba(244,104,104,0.12); border-color: rgba(244,104,104,0.35); color: var(--red); }
.btn-danger:hover { background: rgba(244,104,104,0.22); }

/* STATUS */
.status-bar {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 11px; color: var(--muted); min-height: 18px;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.status-dot.ok { background: var(--green); }
.status-dot.error { background: var(--red); }
.status-dot.loading { background: var(--accent); animation: pulse 1s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.status-text { flex: 1; }
.song-count {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 4px; padding: 1px 6px; font-size: 10px; color: var(--muted);
}

/* TOOLBAR */
.toolbar { display: flex; gap: 6px; align-items: center; flex-direction: column; }
.toolbar .btn { height: 36px; font-size: 12px; padding: 0 12px; }
.toolbar-row { display: flex; gap: 6px; width: 100%; }
.toolbar-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }

/* EDITOR SHELL */
.editor-wrap {
  flex: 1; display: flex; flex-direction: column;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; min-height: 320px; position: relative;
}
.editor-titlebar {
  padding: 6px 12px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: 10px; color: var(--muted);
  flex-shrink: 0;
}
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-r { background: #f46868; } .dot-a { background: var(--amber); } .dot-g { background: var(--green); }
.editor-filename { margin-left: 5px; }

/* EDITOR BODY */
.editor-body {
  flex: 1; position: relative; overflow-y: auto; overflow-x: hidden;
  min-height: 280px; padding: var(--editor-pad) 0;
  outline: none;
}
.editor-body:focus { box-shadow: inset 0 0 0 1px rgba(124,106,247,0.25); }

/* Hidden textarea for mobile input */
.real-ta {
  position: fixed; top: 0px; left: 0px;
  width: 1px; height: 1px; opacity: 0.01;
  pointer-events: none; resize: none;
  border: none; background: transparent; color: transparent;
	transform: translateY(-100px);
  font-size: 16px;
  padding: 0;
}

/* ROW */
.ed-row {
  display: flex; align-items: center;
  min-height: var(--line-h); position: relative;
}
.ed-row:hover .row-btn { opacity: 1; }

.row-gutter-l { width: var(--gutter); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.row-gutter-r { width: var(--gutter); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

.row-btn {
  width: 18px; height: 18px; border-radius: 4px;
  border: 1px solid var(--border2); background: var(--surface2);
  color: var(--muted); font-size: 13px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; opacity: 0;
  transition: opacity 0.12s, background 0.1s, color 0.1s;
  flex-shrink: 0; -webkit-user-select: none; user-select: none;
  touch-action: manipulation; padding: 0; font-family: var(--mono);
}
.row-btn:hover { background: var(--border2); color: var(--text); }
.row-btn-add:hover { background: var(--green-dim); color: var(--green); border-color: rgba(62,207,142,0.5); }
.row-btn-del:hover { background: rgba(244,104,104,0.14); color: var(--red); border-color: rgba(244,104,104,0.45); }
/* Always show on touch */
@media (hover: none) { .row-btn { opacity: 1; } }

.row-content {
  flex: 1; font-family: var(--mono); font-size: 14px;
  line-height: var(--line-h); white-space: pre;
  position: relative; cursor: text; min-width: 0;
  overflow: hidden; display: flex; align-items: center;
  padding-right: 4px;
}

.row-time { color: var(--accent); letter-spacing: 0.4px; flex-shrink: 0; }
.row-sep  { color: var(--muted); flex-shrink: 0; user-select: none; }
.row-text { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; }
.row-text.empty { color: var(--muted); }

/* Active row highlight */
.ed-row.active .row-content { background: rgba(124,106,247,0.05); }

/* Block caret */
.block-caret {
  position: absolute; pointer-events: none;
  background: var(--accent); opacity: 0.7;
  border-radius: 1px;
  animation: blink 1.1s step-end infinite;
  z-index: 5;
}
.block-caret.in-text { background: rgba(232,232,240,0.65); }
@keyframes blink { 0%,100%{opacity:0.7} 50%{opacity:0} }

/* Placeholder */
.editor-placeholder {
  padding: var(--editor-pad) var(--gutter);
  font-family: var(--mono); font-size: 14px; color: var(--muted);
  line-height: 1.9; pointer-events: none;
}

/* CONFIRM */
.confirm-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.65);
  z-index: 200; display: flex; align-items: flex-end;
  justify-content: center; padding-bottom: 20px;
}
.confirm-box {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 20px;
  width: calc(100% - 32px); max-width: 420px;
  display: flex; flex-direction: column; gap: 16px;
  animation: slide-up 0.17s ease;
}
@keyframes slide-up { from{transform:translateY(14px);opacity:0} to{transform:none;opacity:1} }
.confirm-title { font-family: var(--mono); font-size: 14px; color: var(--text); }
.confirm-sub { font-size: 12px; color: var(--muted); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.confirm-btns { display: flex; gap: 8px; }
.confirm-btns .btn { flex: 1; justify-content: center; height: 42px; }

/* TOAST */
#toast-container {
  position: fixed; top: 54px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; gap: 8px;
  align-items: center; pointer-events: none; z-index: 300;
}
.toast {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 20px; padding: 6px 16px;
  font-family: var(--mono); font-size: 12px; color: var(--text);
  animation: t-in 0.2s ease, t-out 0.2s ease 2s forwards; white-space: nowrap;
}
.toast.ok  { border-color: rgba(62,207,142,0.4); color: var(--green); }
.toast.err { border-color: rgba(244,104,104,0.4); color: var(--red); }
@keyframes t-in  { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:none} }
@keyframes t-out { to{opacity:0} }

/* SPINNER */
.spinner {
  display: inline-block; width: 13px; height: 13px;
  border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff;
  border-radius: 50%; animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* MOBILE */
@media (max-width: 480px) {
  main { padding: 10px; gap: 10px; }
  .btn { font-size: 11px; padding: 0 11px; }
  header h1 { font-size: 13px; }
  .header-sub { display: none; }
  :root { --gutter: 28px; }
	.toolbar {
    flex-direction: column;
    gap: 6px;
  }
  .toolbar-row {
    width: 100%;
  }	
  .toolbar-main {
    order: 1;
  }
  .toolbar-history {
    order: 2;
  }
  .toolbar-row .btn {
    flex: 1;
    justify-content: center;
    font-size: clamp(10px, 2.8vw, 12px);
    padding: 0 6px;
  }
  .toolbar-sep {
    display: none;
  }
}
</style>
</head>
<body>

<header>
  <div class="logo-mark">
    <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
      <rect x="2" y="8" width="14" height="2" rx="1" fill="white"/>
      <rect x="2" y="4" width="8" height="2" rx="1" fill="rgba(255,255,255,0.5)"/>
      <rect x="2" y="12" width="11" height="2" rx="1" fill="rgba(255,255,255,0.5)"/>
    </svg>
  </div>
  <h1>TimeCode<span>-Lab</span></h1>
  <span class="header-sub">streamersonglist</span>
</header>

<main>
  <div class="input-row">
    <div class="streamer-select-wrap">
      <select class="streamer-select" id="streamer-select" onchange="onSelectChange(this)">
        <option value="gellert_lera">gellert_lera</option>
        <option value="vanilla__bun">vanilla__bun</option>
        <option value="__custom__">другой стример...</option>
      </select>
      <span class="select-arrow">▼</span>
      <input class="streamer-input" id="streamer-input" type="text"
        placeholder="имя или ID стримера..." autocomplete="off" spellcheck="false"/>
    </div>
    <button class="btn btn-primary" id="btn-load" onclick="loadSongs()">
      <span id="load-label">загрузить</span>
    </button>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-text" id="status-text">выберите стримера</span>
    <span class="song-count" id="song-count" style="display:none"></span>
  </div>

  <div class="toolbar">
		<div class="toolbar-row toolbar-history">
			<button class="btn" id="btn-undo" onclick="edUndo()" title="Ctrl+Z">↩ отмена</button>
			<button class="btn" id="btn-redo" onclick="edRedo()" title="Ctrl+Y">↪ повтор</button>
		</div>	
    <div class="toolbar-sep"></div>
		<div class="toolbar-row toolbar-main">
			<button class="btn btn-green" onclick="calcTimecodes()">⏱ таймкоды</button>
			<button class="btn" onclick="copyText()">⎘ копировать</button>
			<button class="btn" onclick="clearEditor()">✕ очистить</button>
		</div>	
  </div>

  <div class="editor-wrap">
    <div class="editor-titlebar">
      <div class="dot dot-r"></div><div class="dot dot-a"></div><div class="dot dot-g"></div>
      <span class="editor-filename">timecodes.txt</span>
    </div>
    <div class="editor-body" id="editor-body" tabindex="0"></div>
    <textarea class="real-ta" id="real-ta" autocomplete="off" autocorrect="off"  spellcheck="false"></textarea>
  </div>
</main>

<div id="confirm-overlay" class="confirm-overlay" style="display:none" onclick="confirmBgClick(event)">
  <div class="confirm-box">
    <div>
      <div class="confirm-title" id="confirm-title">Подтверждение</div>
      <div class="confirm-sub"  id="confirm-sub"></div>
    </div>
    <div class="confirm-btns">
      <button class="btn" onclick="confirmCancel()">отмена</button>
      <button class="btn btn-danger" id="confirm-ok-btn" onclick="confirmOk()">ОК</button>
    </div>
  </div>
</div>
<div id="toast-container"></div>

<script>
'use strict';

// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const API_BASE       = 'https://api.streamersonglist.com/v1';
const GAP_THRESHOLD  = 6 * 60 * 60 * 1000;
const STORAGE_KEY    = 'tclab_rows2';
const KNOWN_IDS      = { 'gellert_lera': 28268, 'vanilla__bun': 39650 };
const SEP            = ' \u2013 ';   // ' – '
const TC_LEN         = 8;           // "HH:MM:SS"
const SEP_LEN        = SEP.length;  // 3
const PREFIX_LEN     = TC_LEN + SEP_LEN; // 11
// digit positions in "HH:MM:SS": 0,1,3,4,6,7  (2 and 5 are colons)
const DIGIT_COLS     = [0,1,3,4,6,7];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let rows         = [];   // [{ time:'HH:MM:SS', text:string }]
let playedAtArr  = [];   // parallel ms timestamps
let cur          = { row:0, col:0 };
let undoStack    = [];
let redoStack    = [];
let saveTimer    = null;
let confirmCb    = null;
let hasFocus     = false;

// Canvas for char measurement
const MC = document.createElement('canvas');
const MCx = MC.getContext('2d');

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  // restore
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) {
      const p = JSON.parse(s);
      if (Array.isArray(p) && p.length) { rows = p; cur={row:0,col:0}; render(); setStatus('','восстановлено',false); }
    }
  } catch(e){}

  document.getElementById('streamer-input').addEventListener('keydown', e=>{
    if(e.key==='Enter') loadSongs();
  });
  document.getElementById('streamer-input').addEventListener('blur', ()=>{
    const inp=document.getElementById('streamer-input');
    const sel=document.getElementById('streamer-select');
    if(!inp.value.trim()){inp.classList.remove('visible');sel.style.display='';sel.value='gellert_lera';}
  });

  const body=document.getElementById('editor-body');
  body.addEventListener('mousedown', onBodyMouseDown);
  body.addEventListener('touchstart', onBodyTouch, {passive:false});
  body.addEventListener('keydown', onKeyDown);
  body.addEventListener('focus', ()=>{ hasFocus=true; renderCaret(); focusRealTa(); });
  body.addEventListener('blur',  ()=>{ hasFocus=false; removeCaretEl(); });
  body.addEventListener('paste', onPaste);

  const rta=document.getElementById('real-ta');
  rta.addEventListener('keydown', onKeyDown);
  rta.addEventListener('input',   onRtaInput);
  rta.addEventListener('paste',   onPaste);
  rta.addEventListener('focus',   ()=>{ hasFocus=true; renderCaret(); });
  rta.addEventListener('blur',    ()=>{
    // only lose focus if editor-body also lost focus
    setTimeout(()=>{
      if(document.activeElement!==document.getElementById('editor-body') &&
         document.activeElement!==document.getElementById('real-ta')){
        hasFocus=false; removeCaretEl();
      }
    },0);
  });

  updateUndoBtns();
  render();
});

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render() {
  const body = document.getElementById('editor-body');
  body.innerHTML = '';

  if (rows.length === 0) {
    const ph = document.createElement('div');
    ph.className = 'editor-placeholder';
    ph.textContent = 'загрузите стример чтобы начать...';
    body.appendChild(ph);
    return;
  }

  rows.forEach((row, ri) => body.appendChild(buildRowEl(row, ri)));
  renderCaret();
}

function buildRowEl(row, ri) {
  const div = document.createElement('div');
  div.className = 'ed-row' + (ri === cur.row ? ' active' : '');
  div.dataset.row = ri;

  // Left gutter
  const gl = document.createElement('div');
  gl.className = 'row-gutter-l';
  const addBtn = document.createElement('button');
  addBtn.className = 'row-btn row-btn-add';
  addBtn.textContent = '+';
  addBtn.title = 'Добавить строку';
  addBtn.addEventListener('mousedown', e=>{ e.preventDefault(); e.stopPropagation(); insertRowAfter(ri); });
  addBtn.addEventListener('touchend',  e=>{ e.preventDefault(); e.stopPropagation(); insertRowAfter(ri); });
  gl.appendChild(addBtn);
  div.appendChild(gl);

  // Content
  const content = document.createElement('div');
  content.className = 'row-content';
  content.dataset.row = ri;

  const tsp = document.createElement('span');
  tsp.className = 'row-time'; tsp.dataset.part='time';
  tsp.textContent = row.time;

  const ssp = document.createElement('span');
  ssp.className = 'row-sep'; ssp.dataset.part='sep';
  ssp.textContent = SEP;

  const xsp = document.createElement('span');
  xsp.className = 'row-text' + (row.text ? '' : ' empty'); xsp.dataset.part='text';
  xsp.textContent = row.text || '';

  content.appendChild(tsp); content.appendChild(ssp); content.appendChild(xsp);
  div.appendChild(content);

  // Right gutter
  const gr = document.createElement('div');
  gr.className = 'row-gutter-r';
  const delBtn = document.createElement('button');
  delBtn.className = 'row-btn row-btn-del';
  delBtn.textContent = '\u2212';
  delBtn.title = 'Удалить строку';
  delBtn.addEventListener('mousedown', e=>{ e.preventDefault(); e.stopPropagation(); promptDeleteRow(ri); });
  delBtn.addEventListener('touchend',  e=>{ e.preventDefault(); e.stopPropagation(); promptDeleteRow(ri); });
  gr.appendChild(delBtn);
  div.appendChild(gr);

  return div;
}

function reRenderRow(ri) {
  const body = document.getElementById('editor-body');
  const old  = body.querySelector(`.ed-row[data-row="${ri}"]`);
  if (!old) { render(); return; }
  old.replaceWith(buildRowEl(rows[ri], ri));
  renderCaret();
}

function updateActiveClass() {
  document.querySelectorAll('.ed-row').forEach(el=>{
    el.classList.toggle('active', parseInt(el.dataset.row,10) === cur.row);
  });
}

// ═══════════════════════════════════════════
// CARET
// ═══════════════════════════════════════════
let caretEl = null;

function removeCaretEl() {
  if (caretEl) { caretEl.remove(); caretEl = null; }
}

function renderCaret() {
  if (!hasFocus || rows.length === 0) { removeCaretEl(); return; }

  if (!caretEl) {
    caretEl = document.createElement('div');
    caretEl.className = 'block-caret';
    document.getElementById('editor-body').appendChild(caretEl);
  }

  const ri  = cur.row;
  const col = cur.col;
  if (ri >= rows.length) return;

  const rowEl = document.querySelector(`.ed-row[data-row="${ri}"]`);
  if (!rowEl) return;
  const contentEl = rowEl.querySelector('.row-content');

  // Measure font
  const cs = window.getComputedStyle(contentEl);
  MCx.font = `${cs.fontWeight} ${cs.fontSize} ${cs.fontFamily}`;

  const fullStr = rows[ri].time + SEP + rows[ri].text;
  const safeCol = Math.min(col, fullStr.length);
  const xPx = MCx.measureText(fullStr.slice(0, safeCol)).width;
  const charW = MCx.measureText(safeCol < fullStr.length ? fullStr[safeCol] : 'M').width;

  const bodyEl  = document.getElementById('editor-body');
  const bodyRect= bodyEl.getBoundingClientRect();
  const cRect   = contentEl.getBoundingClientRect();
  const top     = cRect.top - bodyRect.top + bodyEl.scrollTop + 4;
  const left    = cRect.left - bodyRect.left + xPx;

  const inText = col >= PREFIX_LEN;
  caretEl.className = 'block-caret' + (inText ? ' in-text' : '');
  caretEl.style.top    = top + 'px';
  caretEl.style.left   = left + 'px';
  caretEl.style.width  = Math.max(2, charW) + 'px';
  caretEl.style.height = (parseInt(cs.lineHeight) - 8) + 'px';

	const rta = document.getElementById('real-ta');
	rta.style.top  = top + 'px';
	rta.style.left = left + 'px';
}

// ═══════════════════════════════════════════
// CURSOR
// ═══════════════════════════════════════════
function rowLen(ri) {
  if (ri < 0 || ri >= rows.length) return 0;
  return rows[ri].time.length + SEP.length + rows[ri].text.length;
}

function setCur(ri, col) {
  ri = Math.max(0, Math.min(ri, rows.length-1));
  col = Math.max(0, Math.min(col, rowLen(ri)));
  cur = { row:ri, col };
  updateActiveClass();
  renderCaret();
  scrollRowIntoView(ri);
}

function scrollRowIntoView(ri) {
  const el = document.querySelector(`.ed-row[data-row="${ri}"]`);
  if (el) el.scrollIntoView({ block:'nearest' });
}

// click
function onBodyMouseDown(e) {
  const rowEl = e.target.closest('.ed-row');
  if (!rowEl) return;
  const ri = parseInt(rowEl.dataset.row, 10);
  if (isNaN(ri)) return;
  e.preventDefault();
  document.getElementById('editor-body').focus();
  focusRealTa();
  const contentEl = rowEl.querySelector('.row-content');
  const col = xToCol(ri, contentEl, e.clientX - contentEl.getBoundingClientRect().left);
  setCur(ri, col);
}
function onBodyTouch(e) {
  const t = e.changedTouches[0];
  const rowEl = document.elementFromPoint(t.clientX, t.clientY)?.closest('.ed-row');
  if (!rowEl) return;
  const ri = parseInt(rowEl.dataset.row, 10);
  if (isNaN(ri)) return;
  e.preventDefault();
  focusRealTa();
  const contentEl = rowEl.querySelector('.row-content');
  const col = xToCol(ri, contentEl, t.clientX - contentEl.getBoundingClientRect().left);
  setCur(ri, col);
}

function xToCol(ri, contentEl, xOff) {
  const cs = window.getComputedStyle(contentEl);
  MCx.font = `${cs.fontWeight} ${cs.fontSize} ${cs.fontFamily}`;
  const full = rows[ri].time + SEP + rows[ri].text;
  let best=0, bestD=Infinity;
  for (let i=0; i<=full.length; i+=1) {
    const d = Math.abs(MCx.measureText(full.slice(0,i)).width - xOff);
    if (d < bestD) { bestD=d; best=i; }
  }
  return best;
}

function focusRealTa() {
  const rta = document.getElementById('real-ta');

  rta.blur();

  setTimeout(() => {
    rta.value = '';
    rta.focus();
  }, 0);
}

// ═══════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════
function onKeyDown(e) {
  // Global shortcuts
  if ((e.ctrlKey||e.metaKey) && !e.shiftKey && e.key==='z') { e.preventDefault(); edUndo(); return; }
  if ((e.ctrlKey||e.metaKey) && (e.key==='y'||(e.key==='z'&&e.shiftKey))) { e.preventDefault(); edRedo(); return; }
  if ((e.ctrlKey||e.metaKey) && e.key==='c') { e.preventDefault(); copyText(); return; }
  if ((e.ctrlKey||e.metaKey) && e.key==='v') return; // let paste event handle

  if (rows.length === 0) return;

  const {row:ri, col} = cur;

  switch(e.key) {
    case 'ArrowLeft':
      e.preventDefault();
      if      (col > 0)             setCur(ri, col-1);
      else if (ri > 0)              setCur(ri-1, rowLen(ri-1));
      break;
    case 'ArrowRight':
      e.preventDefault();
      if      (col < rowLen(ri))    setCur(ri, col+1);
      else if (ri < rows.length-1)  setCur(ri+1, 0);
      break;
    case 'ArrowUp':
      e.preventDefault();
      if (ri > 0) setCur(ri-1, Math.min(col, rowLen(ri-1)));
      break;
    case 'ArrowDown':
      e.preventDefault();
      if (ri < rows.length-1) setCur(ri+1, Math.min(col, rowLen(ri+1)));
      break;
    case 'Home':
      e.preventDefault(); setCur(ri, 0); break;
    case 'End':
      e.preventDefault(); setCur(ri, rowLen(ri)); break;
    case 'Tab':
      e.preventDefault();
      setCur(ri, e.shiftKey ? 0 : PREFIX_LEN);
      break;
    case 'Enter':
      e.preventDefault(); insertRowAfter(ri); break;
    case 'Backspace':
      e.preventDefault(); handleDelete(ri, col, -1); break;
    case 'Delete':
      e.preventDefault(); handleDelete(ri, col, +1); break;
    default:
      if (!e.ctrlKey && !e.metaKey && !e.altKey && e.key.length===1) {
        e.preventDefault(); handleChar(e.key);
      }
      break;
  }
}

function onRtaInput() {
  const rta = document.getElementById('real-ta');
  const val = rta.value;
  rta.value = '';
  if (!val || rows.length===0) return;
  for (const ch of val) handleChar(ch);
}

// ─── Char ───────────────────────────────────
function handleChar(ch) {
  const {row:ri, col} = cur;
  if (ri >= rows.length) return;

  // In separator → jump to text
  if (col >= TC_LEN && col < PREFIX_LEN) {
    setCur(ri, PREFIX_LEN);
    return;
  }

  if (col < TC_LEN) {
    // TIME zone: digits only, overwrite
    if (!/\d/.test(ch)) return;
    // find nearest digit col at or after col
    let dc = DIGIT_COLS.find(d => d >= col);
    if (dc === undefined) { setCur(ri, PREFIX_LEN); return; }
    pushUndo();
    const t = rows[ri].time.split('');
    t[dc] = ch;
    rows[ri].time = t.join('');
    // advance to next digit col
    const nextDc = DIGIT_COLS.find(d => d > dc);
    setCur(ri, nextDc !== undefined ? nextDc : PREFIX_LEN);
    reRenderRow(ri);
    scheduleSave();
  } else {
    // TEXT zone: free insert
    const tc = col - PREFIX_LEN;
    pushUndo();
    rows[ri].text = rows[ri].text.slice(0,tc) + ch + rows[ri].text.slice(tc);
    setCur(ri, col+1);
    reRenderRow(ri);
    scheduleSave();
  }
}

// ─── Delete ─────────────────────────────────
function handleDelete(ri, col, dir) {
  if (ri >= rows.length) return;

  if (col < TC_LEN) {
    let target = col;
    if (dir === -1) {
      // find previous digit col
      const prev = [...DIGIT_COLS].reverse().find(d => d < col);
      if (prev === undefined) return;
      target = prev;
    } else {
      // current digit col
      const dc = DIGIT_COLS.find(d => d >= col);
      if (dc === undefined) return;
      target = dc;
    }
    pushUndo();
    const t = rows[ri].time.split('');
    t[target] = '0';
    rows[ri].time = t.join('');
    setCur(ri, target);
    reRenderRow(ri);
    scheduleSave();

  } else if (col >= TC_LEN && col < PREFIX_LEN) {
    // separator — skip
    if (dir===-1) setCur(ri, TC_LEN-1); else setCur(ri, PREFIX_LEN);

  } else {
    const tc = col - PREFIX_LEN;
    if (dir === -1) {
      if (tc === 0) return;
      pushUndo();
      rows[ri].text = rows[ri].text.slice(0, tc-1) + rows[ri].text.slice(tc);
      setCur(ri, col-1);
    } else {
      if (tc >= rows[ri].text.length) return;
      pushUndo();
      rows[ri].text = rows[ri].text.slice(0, tc) + rows[ri].text.slice(tc+1);
      setCur(ri, col);
    }
    reRenderRow(ri);
    scheduleSave();
  }
}

// ─── Paste ──────────────────────────────────
function onPaste(e) {
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData('text');
  if (!text || rows.length===0) return;
  handlePaste(text);
}

function handlePaste(text) {
  const TC_RE = /^(\d{2}:\d{2}:\d{2})\s*[–—-]\s*(.*)/;
  const lines = text.split('\n').map(l=>l.replace(/\r$/,''));
  const {row:ri, col} = cur;

  pushUndo();

  if (lines.length === 1) {
    const m = lines[0].match(TC_RE);
    if (m) {
      rows[ri] = { time:m[1], text:m[2] };
      setCur(ri, PREFIX_LEN + m[2].length);
    } else if (col >= PREFIX_LEN) {
      const tc = col - PREFIX_LEN;
      rows[ri].text = rows[ri].text.slice(0,tc) + lines[0] + rows[ri].text.slice(tc);
      setCur(ri, col + lines[0].length);
    }
    reRenderRow(ri);
  } else {
    const newRows = lines.map(line => {
      const m = line.match(TC_RE);
      return m ? {time:m[1],text:m[2]} : {time:'00:00:00',text:line};
    });
    rows.splice(ri+1, 0, ...newRows);
    setCur(ri+newRows.length, 0);
    render();
  }
  scheduleSave();
}

// ═══════════════════════════════════════════
// ROW OPERATIONS
// ═══════════════════════════════════════════
function insertRowAfter(ri) {
  pushUndo();
  rows.splice(ri+1, 0, { time:'00:00:00', text:'' });
  render();
  setCur(ri+1, PREFIX_LEN);
  scheduleSave();
}

function promptDeleteRow(ri) {
  if (rows.length <= 1) { toast('нельзя удалить последнюю строку','err'); return; }
  showConfirm(
    'Удалить строку?',
    rows[ri].time + SEP + rows[ri].text.slice(0,40),
    'удалить',
    () => {
      pushUndo();
      rows.splice(ri,1);
      const newRi = Math.min(ri, rows.length-1);
      render();
      setCur(newRi, 0);
      scheduleSave();
    }
  );
}

// ═══════════════════════════════════════════
// UNDO / REDO
// ═══════════════════════════════════════════
function pushUndo() {
  undoStack.push({ rows: JSON.parse(JSON.stringify(rows)), cur:{...cur} });
  if (undoStack.length > 300) undoStack.shift();
  redoStack = [];
  updateUndoBtns();
}

function edUndo() {
  if (!undoStack.length) return;
  redoStack.push({ rows: JSON.parse(JSON.stringify(rows)), cur:{...cur} });
  const s = undoStack.pop();
  rows = s.rows; cur = s.cur;
  render(); updateUndoBtns(); scheduleSave();
}

function edRedo() {
  if (!redoStack.length) return;
  undoStack.push({ rows: JSON.parse(JSON.stringify(rows)), cur:{...cur} });
  const s = redoStack.pop();
  rows = s.rows; cur = s.cur;
  render(); updateUndoBtns(); scheduleSave();
}

function updateUndoBtns() {
  document.getElementById('btn-undo').disabled = undoStack.length === 0;
  document.getElementById('btn-redo').disabled = redoStack.length === 0;
}

// ═══════════════════════════════════════════
// SAVE
// ═══════════════════════════════════════════
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{ localStorage.setItem(STORAGE_KEY, JSON.stringify(rows)); }, 500);
}

// ═══════════════════════════════════════════
// COPY / CLEAR
// ═══════════════════════════════════════════
function rowsToText() { return rows.map(r=>`${r.time}${SEP}${r.text}`).join('\n'); }

async function copyText() {
  if (!rows.length) { toast('нечего копировать','err'); return; }
  const text = rowsToText();
  try { await navigator.clipboard.writeText(text); toast('скопировано','ok'); }
  catch { toast('скопировано','ok'); }
}

function clearEditor() {
  showConfirm('Очистить редактор?','Текст и таймкоды будут удалены','очистить', ()=>{
    pushUndo();
    rows = []; playedAtArr = [];
    render(); scheduleSave();
    setStatus('','редактор очищен',false);
    toast('очищено','');
  });
}

// ═══════════════════════════════════════════
// TIMECODE RECALC  (original logic preserved)
// ═══════════════════════════════════════════
function calcTimecodes() {
  if (!rows.length)        { toast('редактор пуст','err'); return; }
  if (!playedAtArr.length) { toast('сначала загрузите список','err'); return; }

  const count = Math.min(rows.length, playedAtArr.length);
  let anchorIdx = -1;
  for (let i=0; i<count; i++) { if (parseTC(rows[i].time)!==0){anchorIdx=i;break;} }
  if (anchorIdx===-1) { toast('нет якоря — задайте один таймкод','err'); return; }

  pushUndo();
  const ancSec = parseTC(rows[anchorIdx].time);
  let t = ancSec;
  for (let i=anchorIdx; i<count; i++) {
    if (i>anchorIdx) { t+=Math.round((playedAtArr[i]-playedAtArr[i-1])/1000); if(t<0)t=0; }
    rows[i].time = formatTC(t);
  }
  t = ancSec;
  for (let i=anchorIdx-1; i>=0; i--) {
    t-=Math.round((playedAtArr[i+1]-playedAtArr[i])/1000); if(t<0)t=0;
    rows[i].time = formatTC(t);
  }
  render(); scheduleSave(); toast('таймкоды пересчитаны','ok');
}

// ═══════════════════════════════════════════
// API  (original, untouched)
// ═══════════════════════════════════════════
function onSelectChange(sel) {
  const inp=document.getElementById('streamer-input');
  if(sel.value==='__custom__'){ sel.style.display='none'; inp.classList.add('visible'); inp.focus(); }
}

async function resolveStreamerId(nameOrId) {
  if(/^\d+$/.test(nameOrId)) return parseInt(nameOrId,10);
  if(KNOWN_IDS[nameOrId]!==undefined) return KNOWN_IDS[nameOrId];
  const r=await fetch(`${API_BASE}/streamers/${encodeURIComponent(nameOrId)}`);
  if(!r.ok){ if(r.status===404) throw new Error(`стример «${nameOrId}» не найден`); throw new Error(`ошибка API: ${r.status}`); }
  const d=await r.json(); if(!d.id) throw new Error('не удалось получить ID'); return d.id;
}

async function loadSongs() {
  const sel=document.getElementById('streamer-select');
  const inp=document.getElementById('streamer-input');
  const isCustom=inp.classList.contains('visible');
  const nameOrId=isCustom?inp.value.trim():sel.value;
  if(!nameOrId||nameOrId==='__custom__'){toast('введите имя стримера','err');return;}

  setStatus('loading','получаем данные…',false);
  setBtnLoading(true);
  try {
    const sid=await resolveStreamerId(nameOrId);
    const hr=await fetch(`${API_BASE}/streamers/${sid}/playHistory?size=100&current=0`);
    if(!hr.ok) throw new Error(`ошибка истории: ${hr.status}`);
    const hd=await hr.json();
    const items=hd.items||hd.data||hd;
    if(!Array.isArray(items)||!items.length) throw new Error('история воспроизведения пуста');
    const ls=extractLastStream(items);
    if(!ls.length) throw new Error('не удалось определить последний стрим');
    ls.reverse();
    playedAtArr=ls.map(x=>new Date(x.playedAt).getTime());
    pushUndo();
    rows=ls.map(x=>({time:'00:00:00',text:normalizeSong(x)}));
    cur={row:0,col:0};
    render(); scheduleSave();
    setStatus('ok',`${nameOrId} — последний стрим`,true,ls.length);
    toast(`загружено ${ls.length} песен`,'ok');
  } catch(err){
    setStatus('error',err.message||'неизвестная ошибка',false);
    toast(err.message||'ошибка загрузки','err');
  } finally { setBtnLoading(false); }
	
	document.getElementById('editor-body').focus();
	focusRealTa();
}

function extractLastStream(items){
  const r=[items[0]];
  for(let i=1;i<items.length;i++){
    const prev=new Date(items[i-1].playedAt).getTime();
    const curr=new Date(items[i].playedAt).getTime();
    if(prev-curr>GAP_THRESHOLD) break;
    r.push(items[i]);
  }
  return r;
}

function normalizeSong(item){
  if(item.song){
    const{artist='',title=''}=item.song;
    if(artist.trim().toLowerCase().startsWith('из')) return `${title} ${artist}`.trim();
    return `${artist} \u2014 ${title}`.trim();
  }
  if(item.nonlistSong) return item.nonlistSong.trim();
  const r0=item.requests&&item.requests[0];
  if(r0&&r0.nonlistSong) return r0.nonlistSong.trim();
  return 'Неизвестная песня';
}

// ═══════════════════════════════════════════
// TC HELPERS
// ═══════════════════════════════════════════
function parseTC(s){const p=s.split(':').map(Number);return p.length===3?p[0]*3600+p[1]*60+p[2]:p.length===2?p[0]*60+p[1]:0;}
function formatTC(sec){const s=Math.max(0,Math.round(sec));return `${pad(Math.floor(s/3600))}:${pad(Math.floor((s%3600)/60))}:${pad(s%60)}`;}
function pad(n){return String(n).padStart(2,'0');}

// ═══════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════
function setStatus(type,msg,showCount,count){
  const dot=document.getElementById('status-dot');
  const txt=document.getElementById('status-text');
  const cnt=document.getElementById('song-count');
  dot.className='status-dot'+(type==='ok'?' ok':type==='error'?' error':type==='loading'?' loading':'');
  txt.textContent=msg;
  cnt.style.display=(showCount&&count)?'':'none';
  if(showCount&&count) cnt.textContent=`${count} песен`;
}
function setBtnLoading(loading){
  const btn=document.getElementById('btn-load');
  const lbl=document.getElementById('load-label');
  btn.disabled=loading;
  lbl.innerHTML=loading?'<span class="spinner"></span>':'загрузить';
}
function toast(msg,type){
  const c=document.getElementById('toast-container');
  const el=document.createElement('div');
  el.className='toast'+(type?' '+type:'');
  el.textContent=msg; c.appendChild(el);
  setTimeout(()=>el.remove(),2500);
}
function showConfirm(title,sub,okLabel,cb){
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-sub').textContent=sub;
  document.getElementById('confirm-ok-btn').textContent=okLabel;
  confirmCb=cb;
  document.getElementById('confirm-overlay').style.display='flex';
}
function confirmOk(){ document.getElementById('confirm-overlay').style.display='none'; if(confirmCb){confirmCb();confirmCb=null;} }
function confirmCancel(){ document.getElementById('confirm-overlay').style.display='none'; confirmCb=null; }
function confirmBgClick(e){ if(e.target===document.getElementById('confirm-overlay')) confirmCancel(); }
</script>
